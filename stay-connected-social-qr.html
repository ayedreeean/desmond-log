<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stay Connected Social QR Card</title>
  <style>
    :root {
      --navy:#062d5f;
      --blue:#0c61c9;
      --blue2:#0066d9;
      --ink:#063161;
      --muted:#3f4d5d;
      --paper:#f8fbff;
      --line:#0f5da9;
      --fb:#0954b1;
      --ig1:#8a22c7;
      --ig2:#f13c72;
      --ig3:#ff9b32;
      --shadow:0 18px 45px rgba(17,45,87,.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center; padding:28px;
      background:linear-gradient(135deg,#dfeaf7,#f9fbff 48%,#dae8f9);
      color:var(--ink);
    }
    .poster{
      width:min(1120px,100%); aspect-ratio: 1.45 / 1; position:relative; overflow:hidden;
      border-radius:28px; background:linear-gradient(135deg,#fdfefe 0%,#f5f8fc 60%,#eef5ff 100%);
      box-shadow:0 28px 75px rgba(8,32,68,.22); padding:34px 70px 34px;
      isolation:isolate;
    }
    .poster:before{
      content:""; position:absolute; left:-80px; top:-100px; width:320px; height:320px; border-radius:50%;
      background:conic-gradient(from 210deg,#006bcf 0 35%,#0b4ea8 35% 52%,transparent 52%);
      z-index:-1;
    }
    .poster:after{
      content:""; position:absolute; right:-80px; bottom:-105px; width:380px; height:320px; border-radius:50%;
      background:conic-gradient(from 30deg,#0b4ea8 0 35%,#0073dc 35% 51%,transparent 51%);
      z-index:-1;
    }
    .corner-lines{ position:absolute; inset:0; pointer-events:none; opacity:.16; }
    .corner-lines:before,.corner-lines:after{ content:""; position:absolute; width:145px; height:145px; border:2px solid #9fb4cd; border-radius:50%; }
    .corner-lines:before{ right:42px; top:-62px; box-shadow:0 0 0 12px transparent, 0 0 0 14px #9fb4cd, 0 0 0 28px transparent, 0 0 0 30px #9fb4cd; }
    .corner-lines:after{ left:-55px; bottom:-55px; box-shadow:0 0 0 12px transparent, 0 0 0 14px #9fb4cd, 0 0 0 28px transparent, 0 0 0 30px #9fb4cd; }
    .dots{ position:absolute; width:96px; height:96px; background-image:radial-gradient(#9ab5d2 2px,transparent 2px); background-size:14px 14px; opacity:.45; }
    .dots.left{ left:34px; top:150px } .dots.right{ right:52px; top:178px }
    header{ text-align:center; position:relative; z-index:1; }
    .headline-row{ display:flex; align-items:center; justify-content:center; gap:34px; }
    .headline-row span{ width:112px; height:3px; background:#0b4e96; border-radius:99px; opacity:.85; }
    h1{
      margin:0; font-size:clamp(42px,6vw,72px); line-height:.92; letter-spacing:.035em;
      font-family: Impact, "Arial Black", Haettenschweiler, sans-serif; color:#063464; text-transform:uppercase;
    }
    .subtitle{ margin:10px 0 22px; color:#434b57; font-size:clamp(20px,2.4vw,31px); font-weight:650; }
    .cards{ display:grid; grid-template-columns:1fr 1fr; gap:32px; width:min(820px,88%); margin:0 auto; }
    .card{
      background:white; border-radius:26px; box-shadow:var(--shadow); overflow:hidden; min-width:0;
      border:1px solid rgba(13,66,125,.06);
    }
    .card-title{ height:96px; display:flex; align-items:center; justify-content:center; gap:16px; color:white; font-size:31px; font-weight:950; text-transform:uppercase; letter-spacing:-.02em; }
    .card.fb .card-title{ background:linear-gradient(135deg,#0749a3,#0b61c9); }
    .card.ig .card-title{ background:linear-gradient(135deg,var(--ig1),var(--ig2),var(--ig3)); }
    .social-icon{ width:58px; height:58px; border-radius:50%; display:grid; place-items:center; background:white; color:#0b57ba; font-family:Impact,"Arial Black",sans-serif; font-size:48px; line-height:1; }
    .ig-icon{ width:58px; height:58px; border:6px solid white; border-radius:16px; position:relative; }
    .ig-icon:before{ content:""; position:absolute; width:18px; height:18px; border:6px solid white; border-radius:50%; left:13px; top:13px; }
    .ig-icon:after{ content:""; position:absolute; width:8px; height:8px; background:white; border-radius:50%; right:9px; top:9px; }
    .qr-wrap{ padding:28px 38px 22px; text-align:center; }
    .qr{ width:min(100%,265px); aspect-ratio:1; object-fit:contain; display:block; margin:0 auto 18px; image-rendering:auto; }
    .rule{ height:3px; width:83%; margin:0 auto 17px; border-radius:99px; }
    .fb .rule{ background:#0954b1; } .ig .rule{ background:linear-gradient(90deg,#f2aa31,#d83c83,#8927c8); }
    .link-text{
      font-size:17px; line-height:1.25; color:#073769; font-weight:800; word-break:break-word; min-height:43px;
    }
    .handle{ font-size:30px; font-weight:950; color:#172033; letter-spacing:-.03em; font-family:Impact,"Arial Black",sans-serif; }
    .reaction{ position:absolute; width:78px; height:78px; border-radius:50%; display:grid; place-items:center; color:white; box-shadow:0 12px 25px rgba(0,0,0,.18); font-size:40px; font-weight:900; }
    .like{ left:93px; top:418px; background:#1162c7; }
    .heart{ right:95px; top:418px; background:linear-gradient(135deg,#ff9b2e,#f23772,#7c2dd1); }
    .burst{ position:absolute; font-size:44px; color:#062d5f; font-weight:900; }
    .burst.left{ left:80px; top:392px; transform:rotate(-25deg); }
    .burst.right{ right:88px; top:390px; transform:rotate(25deg); }
    footer{ text-align:center; margin-top:18px; font-size:22px; color:#082c59; font-weight:850; }
    footer .heart-blue{ color:#0055ad; font-size:25px; }
    @media(max-width:850px){
      body{ padding:12px; } .poster{ aspect-ratio:auto; padding:30px 22px 26px; }
      .headline-row span{ display:none; } .cards{ grid-template-columns:1fr; width:100%; gap:22px; }
      .reaction,.burst,.dots{ display:none; } .card-title{ font-size:25px; height:82px; }
    }
  </style>
</head>
